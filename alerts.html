<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>929 Dispatch Incident Reporter</title>
    <style>
        :root {
            --primary-color: #ff4d4d;
            --primary-dark: #cc0000;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #b0b0b0;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 15px;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .col {
            flex: 1;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: var(--primary-dark);
        }

        .btn-submit:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
            line-break: anywhere;
        }

        .status-loading { background-color: #332700; color: #ffcc00; border: 1px solid #664d00; display: block; }
        .status-success { background-color: #143317; color: #4caf50; border: 1px solid #1e4d22; display: block; }
        .status-error { background-color: #331414; color: #f44336; border: 1px solid #4d1e1e; display: block; }
        
        .destination-badge {
            background: #151515; 
            padding: 10px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            font-size: 12px; 
            color: var(--text-muted); 
            border-left: 3px solid var(--primary-color);
        }
        .destination-badge select {
            width: auto;
            padding: 2px 5px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 11px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>929 Dispatch Input System</h1>
        <p>Awtomatikong pag-add ng alert sa repository database</p>
    </div>

    <div class="destination-badge">
        <strong>Target Owner:</strong> 
        <select id="repoOwnerSelect">
            <option value="929-fire">929-fire</option>
            <option value="aldrin-tamayo">aldrin-tamayo</option>
        </select>
        | <strong>Repo:</strong> <span style="color: #fff;">929-alerts</span> 
        | <strong>File:</strong> <span style="color: #ff4d4d; font-weight: bold;">alerts.json</span>
        <br><small style="color: #666;">*Piliin kung saang account nakalagay ang '929-alerts' repo mo para iwas Error 404.</small>
    </div>

    <form id="incidentForm">
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="alertCode">Alert Code (10-Code):</label>
                    <select id="alertCode" required>
                        <option value="10-70">10-70 (Fire Alert / Sunog)</option>
                        <option value="10-50">10-50 (Vehicle Accident)</option>
                        <option value="10-16">10-16 (Medical Emergency)</option>
                        <option value="10-74">10-74 (Rescue / Others)</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="alertType">Uri ng Insidente (Text):</label>
                    <input type="text" id="alertType" value="Fire Alert" readonly style="background-color: #1a1a1a; color: #888;">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="location">Eksaktong Lokasyon / Address:</label>
            <input type="text" id="location" required placeholder="E.g., 9123 Narra St, Barangay Guadalupe, Makati City">
        </div>

        <div class="form-group">
            <label for="involved">Mga Sangkot (Involved):</label>
            <input type="text" id="involved" required value="N/A" placeholder="E.g., 2 Motor Vehicles, Residential House, o N/A">
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="status">Kasalukuyang Status:</label>
                    <select id="status" required>
                        <option value="For Verification">For Verification</option>
                        <option value="Positive">Positive</option>
                        <option value="Responding">Responding / En Route</option>
                        <option value="Under Control">Under Control</option>
                        <option value="Clear">Clear / Code 10-42</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="dateTime">Petsa at Oras (Awtomatiko):</label>
                    <input type="text" id="dateTime" readonly style="background-color: #1a1a1a; color: #888;">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Mga Karagdagang Tala (Notes):</label>
            <textarea id="notes" rows="3" placeholder="E.g., On Going 911, Bureau of Fire Responding, o N/A">N/A</textarea>
        </div>

        <div id="statusBox" class="status-box"></div>

        <button type="submit" class="btn-submit" id="submitBtn">I-send Alert sa System</button>
    </form>
</div>

<script>
    // Narito ang iyong aktibong token key
    const GITHUB_TOKEN = "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";
    const REPO_NAME = "929-alerts";
    const FILE_PATH = "alerts.json";

    const codeMap = {
        "10-70": "Fire Alert",
        "10-50": "Vehicle Accident",
        "10-16": "Medical Emergency",
        "10-74": "Rescue / Emergency"
    };

    document.getElementById('alertCode').addEventListener('change', function() {
        document.getElementById('alertType').value = codeMap[this.value] || "Emergency Alert";
    });

    function updateTimestamp() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12;
        const strTime = String(hours).padStart(2, '0') + ':' + minutes + ':' + seconds + ampm;
        
        document.getElementById('dateTime').value = `${year}-${month}-${day}T${strTime}`;
    }
    
    setInterval(updateTimestamp, 1000);
    updateTimestamp();

    function showStatus(message, type) {
        const box = document.getElementById('statusBox');
        box.className = "status-box status-" + type;
        box.innerText = message;
        box.style.display = "block";
    }

    // Ligtas na base64 encoder/decoder para sa mga spaces at unicode symbols
    function safeAtob(str) {
        return decodeURIComponent(escape(atob(str.replace(/\s/g, ''))));
    }

    function safeBtoa(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }

    document.getElementById('incidentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const currentOwner = document.getElementById('repoOwnerSelect').value;

        submitBtn.disabled = true;
        showStatus("Kinokonekta ang GitHub at binabasa ang kasalukuyang alerts.json...", "loading");

        const uniqueId = "929-CMD-" + String(Date.now()).slice(-3);

        const newAlertData = {
            "alert_id": uniqueId,
            "alert_code": document.getElementById('alertCode').value,
            "alert_type": document.getElementById('alertType').value,
            "location": document.getElementById('location').value.trim(),
            "involved": document.getElementById('involved').value.trim(),
            "status": document.getElementById('status').value,
            "date_time": document.getElementById('dateTime').value,
            "notes": document.getElementById('notes').value.trim()
        };

        const url = `https://api.github.com/repos/${currentOwner}/${REPO_NAME}/contents/${FILE_PATH}`;

        try {
            let currentSha = null;
            let currentJsonStructure = {
                "metadata": {
                    "system_name": "929 Alerts Dispatch System",
                    "version": "1.12",
                    "source": "929-API/Drin Wx",
                    "timezone": "Asia/Manila",
                    "description": "Real-time alerts monitoring and dispatch system."
                },
                "fire_alerts": []
            };

            // 1. Kuhanin ang JSON record file mula sa repository mo
            const response = await fetch(url, {
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Accept": "application/vnd.github.v3+json",
                    "Cache-Control": "no-cache"
                }
            });

            if (response.status === 200) {
                const fileData = await response.json();
                currentSha = fileData.sha;
                
                // Decode gamit ang clean space handler function natin para walang string break error
                const decodedString = safeAtob(fileData.content);
                currentJsonStructure = JSON.parse(decodedString);
            } else if (response.status === 404) {
                console.log("Wala pang file. Gagawa ng bagong standard database system JSON structure.");
            } else if (response.status === 401) {
                throw new Error("401 Unauthorized: Expired o hinarang ni GitHub ang iyong token key.");
            } else {
                throw new Error(`Hindi maka-konekta. Status Code: ${response.status}`);
            }

            if (!currentJsonStructure.fire_alerts) {
                currentJsonStructure.fire_alerts = [];
            }

            // 2. Isalpak ang bagong data sa unahan ng array list natin
            currentJsonStructure.fire_alerts.unshift(newAlertData);

            const updatedJsonString = JSON.stringify(currentJsonStructure, null, 2);
            const base64Content = safeBtoa(updatedJsonString);

            // 3. I-push pabalik sa target destination ang bagong data update
            const pushPayload = {
                message: `929 Dispatcher Update: Logged ${newAlertData.alert_code} at ${newAlertData.location}`,
                content: base64Content
            };

            if (currentSha) {
                pushPayload.sha = currentSha;
            }

            const putResponse = await fetch(url, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json",
                    "Accept": "application/vnd.github.v3+json"
                },
                body: JSON.stringify(pushPayload)
            });

            if (putResponse.ok) {
                showStatus(`Tagumpay! Nai-post ang ${newAlertData.alert_code} at awtomatikong pumasok na sa alerts.json ng repo mo.`, "success");
                document.getElementById('location').value = "";
                document.getElementById('involved').value = "N/A";
                document.getElementById('notes').value = "N/A";
            } else {
                const errJson = await putResponse.json();
                throw new Error(errJson.message || "Pumalya ang pagsusulat sa database file.");
            }

        } catch (error) {
            console.error(error);
            showStatus(`Error: ${error.message} (Tiyaking tama ang piniling Target Owner sa itaas!)`, "error");
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
