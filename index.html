<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard System</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .dashboard-container { max-width: 600px; width: 100%; display: none; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 150px; resize: none; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #007bff; cursor: pointer; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; display: none; }
        .success { color: green; font-size: 14px; margin-bottom: 10px; display: none; }
        .logout-btn { background-color: #dc3545; margin-top: 10px; }
        .logout-btn:hover { background-color: #bd2130; }
    </style>
</head>
<body>

    <div class="container" id="authBox">
        <h2 id="formTitle">Login</h2>
        <div class="error" id="authError">Maling username o password!</div>
        <div class="success" id="authSuccess">Account created successfully!</div>
        
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <button id="mainBtn" onclick="handleAuth()">Login</button>
        <div class="toggle-link" id="toggleForm" onclick="switchForm()">Walang account? Mag-create dito.</div>
    </div>

    <div class="dashboard-container" id="dashboardBox">
        <h2>Maligayang Pagdating, <span id="userDisplay" style="color: #007bff;">User</span>! 👋</h2>
        <p>I-edit ang iyong personal na dashboard content sa ibaba:</p>
        
        <textarea id="dashboardContent" placeholder="Isulat dito ang gusto mong i-save..."></textarea>
        
        <button onclick="saveDashboardData()">💾 I-save ang Content</button>
        <button class="logout-btn" onclick="logout()">🚪 Log Out</button>
    </div>

    <script>
        // Simulasyon ng Database gamit ang localStorage
        // Kinukuha ang mga rehistradong accounts. Kung wala pa, gagawa ng walang lamang object {}.
        let usersDB = JSON.parse(localStorage.getItem('usersDB')) || {};
        let currentUser = null;
        let isLoginMode = true;

        // Lipat mula Login papuntang Register at vice-versa
        function switchForm() {
            isLoginMode = !isLoginMode;
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authSuccess').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';

            if (isLoginMode) {
                document.getElementById('formTitle').innerText = 'Login';
                document.getElementById('mainBtn').innerText = 'Login';
                document.getElementById('toggleForm').innerText = 'Walang account? Mag-create dito.';
            } else {
                document.getElementById('formTitle').innerText = 'Create Account';
                document.getElementById('mainBtn').innerText = 'Register';
                document.getElementById('toggleForm').innerText = 'May account na? Mag-log in dito.';
            }
        }

        // Pagproseso ng Login o Registration
        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('authError');
            const successBox = document.getElementById('authSuccess');

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            if (!user || !pass) {
                errorBox.innerText = "Mangyaring punan ang lahat ng field.";
                errorBox.style.display = 'block';
                return;
            }

            if (isLoginMode) {
                // LOGIN PROCESS
                if (usersDB[user] && usersDB[user].password === pass) {
                    currentUser = user;
                    showDashboard();
                } else {
                    errorBox.innerText = "Maling username o password!";
                    errorBox.style.display = 'block';
                }
            } else {
                // CREATE ACCOUNT PROCESS
                if (usersDB[user]) {
                    errorBox.innerText = "Ang username na iyan ay may may-ari na!";
                    errorBox.style.display = 'block';
                } else {
                    // Ise-save ang bagong user sa ating "Database" object kasama ang walang lamang dashboard data
                    usersDB[user] = {
                        password: pass,
                        dashboardData: "" 
                    };
                    // I-save ang na-update na database sa storage ng browser
                    localStorage.setItem('usersDB', JSON.stringify(usersDB));
                    
                    successBox.innerText = "Registered successfully! Pwede ka nang mag-login.";
                    successBox.style.display = 'block';
                    switchForm(); // Balik sa login view automatically
                }
            }
        }

        // Pagpapakita ng Dashboard kapag successful ang login
        function showDashboard() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('dashboardBox').style.display = 'block';
            document.getElementById('userDisplay').innerText = currentUser;
            
            // Ipapakita ang dating sineave na data ng user (kung meron man)
            document.getElementById('dashboardContent').value = usersDB[currentUser].dashboardData || "";
        }

        // Pag-save ng data sa loob ng dashboard ng mismong user
        function saveDashboardData() {
            const content = document.getElementById('dashboardContent').value;
            
            // I-update lang ang field ng active na user ngayon
            usersDB[currentUser].dashboardData = content;
            localStorage.setItem('usersDB', JSON.stringify(usersDB));
            
            alert("Matagumpay na nai-save ang iyong dashboard!");
        }

        // Pag-logout ng account
        function logout() {
            currentUser = null;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('dashboardBox').style.display = 'none';
            document.getElementById('authBox').style.display = 'block';
        }
    </script>
</body>
</html>
